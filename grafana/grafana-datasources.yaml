apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: moj-observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
        isDefault: true
        jsonData:
          httpHeaderName1: Authorization
          tlsSkipVerify: true
        secureJsonData:
          httpHeaderValue1: "Bearer ${PROMETHEUS_TOKEN}"
        editable: true
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo-moj-jaegerui.moj-observability.svc.cluster.local:16686
        editable: true
        jsonData:
          tracesToMetrics:
            datasourceUid: prometheus
          nodeGraph:
            enabled: true
