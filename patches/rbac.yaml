apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-annotator
  namespace: moj-vector-data
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: otel-annotator
  namespace: moj-vector-data
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: otel-annotator
  namespace: moj-vector-data
subjects:
  - kind: ServiceAccount
    name: otel-annotator
    namespace: moj-vector-data
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: otel-annotator
