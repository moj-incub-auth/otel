apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: moj-alerts
  namespace: moj-observability
  labels:
    app.kubernetes.io/part-of: moj-otel
spec:
  groups:
    - name: vllm-alerts
      rules:
        - alert: VLLMHighLatency
          expr: histogram_quantile(0.95, rate(vllm:e2e_request_latency_seconds_bucket{namespace="vllm-serving"}[5m])) > 30
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "vLLM P95 latency above 30s"
            description: "{{ $labels.model_name }} P95 latency is {{ $value }}s"
        - alert: VLLMHighErrorRate
          expr: rate(vllm:request_success_total{namespace="vllm-serving"}[5m]) == 0 and rate(vllm:request_failure_total{namespace="vllm-serving"}[5m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "vLLM model serving only errors"
            description: "{{ $labels.model_name }} has 0 successful requests in the last 5m"
    - name: search-api-alerts
      rules:
        - alert: SearchAPIDown
          expr: up{job="moj-search-api-metrics", namespace="milvus"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "MOJ Search API is down"
            description: "moj-search-api has been unreachable for 2 minutes"
